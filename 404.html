  <!-- CSS -->
  <link rel="stylesheet" href="style.css?v=2" />
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" type="image/png" href="images/favicon.png" onerror="this.src='your-favicon.png'">
  
  <style>
    .error-container {
        min-height: calc(100vh - 350px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    
    .error-card {
        background: var(--panel-bg-dark);
        border: 1px solid var(--border-color-dark);
        border-radius: 24px;
        padding: 50px 40px;
        max-width: 500px;
        width: 100%;
        text-align: center;
        backdrop-filter: blur(16px) saturate(180%);
        box-shadow: var(--shadow-lg);
        transition: var(--transition-smooth);
    }
    
    .error-card:hover {
        box-shadow: var(--shadow-lg), var(--shadow-glow);
        border-color: var(--border-color-hover-dark);
        transform: translateY(-5px);
    }
    
    body.light-mode .error-card {
        background: var(--panel-bg-light);
        border-color: var(--border-color-light);
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    
    body.light-mode .error-card:hover {
        box-shadow: 0 15px 40px rgba(0,0,0,0.1), 0 0 25px rgba(99,102,241,0.15);
        border-color: var(--border-color-hover-light);
    }
    
    .error-icon {
        font-size: 5rem;
        background: var(--secondary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
        display: inline-block;
        animation: float 3s ease-in-out infinite;
    }
    
    .error-card h1 {
        font-family: 'Outfit', sans-serif;
        font-size: 5rem;
        font-weight: 800;
        margin: 0;
        line-height: 1;
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    
    .error-card h2 {
        font-family: 'Outfit', sans-serif;
        font-size: 1.8rem;
        color: #ffffff;
        margin-top: 10px;
        margin-bottom: 15px;
        border-bottom: none;
        padding-bottom: 0;
    }
    
    body.light-mode .error-card h2 {
        color: var(--text-primary-light);
    }
    
    .error-card p {
        color: var(--text-secondary-dark);
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 30px;
    }
    
    body.light-mode .error-card p {
        color: var(--text-secondary-light);
    }
    
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  
  <header class="project-header" style="max-width: 500px; padding: 20px; margin: 40px auto 20px auto;">
    <div class="mode-toggle">
      <label class="switch">
        <input type="checkbox" id="toggle-mode">
        <span class="slider"></span>
      </label>
    </div>
    <nav class="header-nav" style="margin-top: 10px;">
      <a href="index.html" class="scroll-link">← Back to Portfolio</a>
    </nav>
  </header>
  
  <main class="error-container">
    <div class="error-card" data-aos="zoom-in" data-aos-duration="800">
      <div class="error-icon">
        <i class="fas fa-compass"></i>
      </div>
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The specified page was not found on this website. Please check the URL for mistakes or return to the home page.</p>
      <a href="index.html" class="project-btn"><i class="fas fa-home"></i> Back to Home</a>
    </div>
  </main>
  
  <footer>
    <div class="social-links">
      <a href="https://github.com/prakarsh34" target="_blank"><i class="fab fa-github"></i> GitHub</a>
      <a href="https://www.linkedin.com/in/prakarsh-awasthi-332614312/" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
      <a href="https://www.instagram.com/prakarsh_34/" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
    </div>
    <p>© 2026 Prakarsh Awasthi · Built with ❤️ & Elegance</p>
  </footer>
  
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="particles.min.js"></script>
  <script src="script.js?v=2"></script>
</body>
</html>
